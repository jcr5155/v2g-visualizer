<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2G Power Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  background:#090c10;
  color:#fff;
  font-family:'Inter', sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-bottom:32px;
}

header {
  width:100%;
  max-width:960px;
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  padding:18px 20px 6px;
}

header h1 {
  font-size:13px;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.55);
}

#mode-label {
  font-size:12px;
  font-weight:500;
  color:#4fc3f7;
  letter-spacing:0.3px;
}

canvas {
  display:block;
  cursor:pointer;
}

/* ── Controls ──────────────────── */
#controls {
  width:100%;
  max-width:960px;
  padding:12px 20px 0;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.ctrl-block { flex:1; min-width:180px; }

.ctrl-label {
  font-size:9px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.22);
  margin-bottom:7px;
}

.btn-row { display:flex; flex-direction:column; gap:5px; }

.mode-btn {
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:8px;
  color:rgba(255,255,255,0.38);
  font-family:'Inter',sans-serif;
  font-size:11px; font-weight:500;
  padding:9px 11px;
  cursor:pointer;
  text-align:left;
  transition:all .15s;
  line-height:1.4;
}
.mode-btn:hover { border-color:rgba(255,255,255,0.14); color:rgba(255,255,255,0.6); }
.mode-btn.active {
  background:rgba(79,195,247,0.08);
  border-color:rgba(79,195,247,0.38);
  color:#fff;
}
.mode-btn .num { color:rgba(79,195,247,0.65); font-weight:700; margin-right:2px; }
.mode-sub { color:rgba(255,255,255,0.22); font-size:9.5px; display:block; margin-top:2px; }
.mode-btn.active .mode-sub { color:rgba(79,195,247,0.45); }

.solar-toggle {
  display:flex; align-items:center; gap:9px;
  padding:9px 11px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:8px;
  cursor:pointer; user-select:none;
  transition:border-color .16s;
  width:fit-content;
}
.solar-toggle.on { border-color:rgba(245,166,35,0.35); background:rgba(245,166,35,0.06); }
.pip { width:28px; height:15px; background:#1a1a1a; border-radius:8px; position:relative; flex-shrink:0; }
.pip::after { content:''; position:absolute; top:2.5px; left:2.5px; width:10px; height:10px; border-radius:50%; background:#3a3a3a; transition:all .18s; }
.solar-toggle.on .pip::after { left:15.5px; background:#f5a623; box-shadow:0 0 5px rgba(245,166,35,0.8); }
.solar-toggle span { font-size:11.5px; font-weight:500; color:rgba(255,255,255,0.4); }
.solar-toggle.on span { color:rgba(255,255,255,0.82); }
</style>
</head>
<body>

<header>
  <h1>V2G Power Flow</h1>
  <div id="mode-label">EV Charging</div>
</header>

<canvas id="c" width="960" height="580"></canvas>

<div id="controls">
  <div class="ctrl-block">
    <div class="ctrl-label">Operation Mode</div>
    <div class="btn-row">
      <button class="mode-btn active" data-mode="0">
        <span class="num">①</span> EV Charging
        <span class="mode-sub">Grid + Solar → EV at 7.2 kW L2</span>
      </button>
      <button class="mode-btn" data-mode="1">
        <span class="num">②</span> V2G – Savings Mode
        <span class="mode-sub">EV covers load, avoids peak TOU</span>
      </button>
      <button class="mode-btn" data-mode="2">
        <span class="num">③</span> V2G VPP – Net Zero
        <span class="mode-sub">EV dynamically tracks net-zero grid</span>
      </button>
      <button class="mode-btn" data-mode="3">
        <span class="num">④</span> V2G VPP – Fixed Output
        <span class="mode-sub">EV at 11.5 kW, surplus exports to grid</span>
      </button>
    </div>
  </div>
  <div class="ctrl-block" style="max-width:200px">
    <div class="ctrl-label">Generation</div>
    <div class="solar-toggle on" id="solar-toggle">
      <div class="pip"></div>
      <span>☀ Solar PV — 4.0 kW</span>
    </div>
  </div>
</div>

<script>
'use strict';
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 960, H = 580;

// ── Constants ─────────────────────────────
const SOLAR_KW  = 4.0;
const CHARGE_KW = 7.2;
const MAX_DISCH = 11.5;
const MAX_VIZ   = 16;

// ── State ─────────────────────────────────
const S = {
  mode: 0,
  solar: true,
  tick: 0,
  loads: { hvac:true, stove:false, dryer:false, hwh:false },
  loadKW:{ hvac:3.5,  stove:5.5,   dryer:5.0,   hwh:4.5 },
};

// ── Layout ─────────────────────────────────
// Diamond centre
const JX = 420, JY = 295;

// Main nodes
const NODES = {
  solar: { x:420,  y:68,   r:52, color:'#f5a623', label:'Solar' },
  grid:  { x:78,   y:295,  r:52, color:'#9b9b9b', label:'Grid'  },
  home:  { x:640,  y:295,  r:52, color:'#4fc3f7', label:'Home'  },
  ev:    { x:420,  y:520,  r:52, color:'#4cd964', label:'EV'    },
};

// Load nodes (branch from Home toward right side)
const LOAD_NODES = {
  hvac:  { x:870, y:148, r:30, color:'#38bdf8', label:'HVAC',         kw:3.5, icon:'❄' },
  stove: { x:870, y:258, r:30, color:'#fb923c', label:'Stove',        kw:5.5, icon:'♨' },
  dryer: { x:870, y:368, r:30, color:'#c084fc', label:'Dryer',        kw:5.0, icon:'💨' },
  hwh:   { x:870, y:478, r:30, color:'#f87171', label:'Water Heater', kw:4.5, icon:'🔥' },
};

// ── Power math ────────────────────────────
function calcFlows() {
  const sol  = S.solar ? SOLAR_KW : 0;
  const load = Object.keys(S.loads).reduce((t,k) => t+(S.loads[k]?S.loadKW[k]:0), 0);
  let pSolar=sol, pGrid=0, pEV=0;
  const pHome = -load;
  switch(S.mode) {
    case 0: pEV=-CHARGE_KW; pGrid=load+CHARGE_KW-sol; break;
    case 1: { const n=load-sol; pEV=n<=0?0:Math.min(MAX_DISCH,n); pGrid=n<=0?n:n-pEV; } break;
    case 2: { const sig=Math.sin(S.tick/48)*0.6, n=load-sol;
              if(n<=0){pEV=0;pGrid=n+sig*0.3;}
              else{pEV=Math.min(MAX_DISCH,Math.max(0,n+sig));pGrid=n-pEV;} } break;
    case 3: pEV=MAX_DISCH; pGrid=load-sol-MAX_DISCH; break;
  }
  return {pSolar,pGrid,pEV,pHome,load,sol};
}

// ── Particle pools ────────────────────────
// Main spokes: solar, grid, ev, home
// Load branches: hvac, stove, dryer, hwh
const parts = {solar:[],grid:[],ev:[],home:[],hvac:[],stove:[],dryer:[],hwh:[]};

function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function lerp(a,b,t){return a+(b-a)*t;}
function bez(t,fx,fy,cpx,cpy,tx,ty){const m=1-t;return{x:m*m*fx+2*m*t*cpx+t*t*tx,y:m*m*fy+2*m*t*cpy+t*t*ty};}

function spawnPart(pool, pw, toCenter) {
  const abs=Math.abs(pw);
  const spd=(abs/MAX_VIZ)*0.020+0.007;
  const delay=Math.max(5,Math.round(26-(abs/MAX_VIZ)*17));
  if(S.tick%delay===0) pool.push({t:toCenter?0.04:0.96,dir:toCenter?1:-1,abs,spd});
}

function tickParts(flows) {
  // Main spokes: +pw = toward junction
  const main={solar:flows.pSolar,grid:flows.pGrid,ev:flows.pEV,home:flows.pHome};
  Object.keys(main).forEach(id=>{
    const pw=main[id],abs=Math.abs(pw);
    if(abs<0.05){parts[id]=[];return;}
    spawnPart(parts[id],pw,pw>0);
    parts[id]=parts[id].filter(p=>{p.t+=p.dir*p.spd;return p.t>=0&&p.t<=1;});
  });
  // Load branches: power always flows Home→Load (positive = active)
  Object.keys(LOAD_NODES).forEach(id=>{
    const pw=S.loads[id]?S.loadKW[id]:0;
    if(pw<0.05){parts[id]=[];return;}
    spawnPart(parts[id],pw,true); // true = t goes 0→1, i.e. Home → Load
    parts[id]=parts[id].filter(p=>{p.t+=p.dir*p.spd;return p.t>=0&&p.t<=1;});
  });
}

function drawParticles(id, fx,fy,cpx,cpy,tx,ty, color) {
  parts[id].forEach(p=>{
    const pos=bez(p.t,fx,fy,cpx,cpy,tx,ty);
    const r=2.2+(p.abs/MAX_VIZ)*2.5;
    const g=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,r*3.2);
    g.addColorStop(0,rgba(color,0.90));
    g.addColorStop(0.4,rgba(color,0.28));
    g.addColorStop(1,rgba(color,0));
    ctx.beginPath();ctx.arc(pos.x,pos.y,r*3.2,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(pos.x,pos.y,r*0.52,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  });
}

// ── Draw a spoke line (straight, node→junction) ──────────────
function drawSpoke(n, pw, toJX, toJY) {
  const abs=Math.abs(pw), active=abs>0.05;
  ctx.save();
  ctx.strokeStyle=active?rgba(n.color,0.20):'rgba(255,255,255,0.04)';
  ctx.lineWidth=active?2:1.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(n.x,n.y); ctx.lineTo(toJX,toJY); ctx.stroke();
  ctx.restore();
}

// ── Draw direction arrow along a straight path ───────────────
function drawArrow(x1,y1,x2,y2,col,t=0.58) {
  const ax=lerp(x1,x2,t), ay=lerp(y1,y2,t);
  const ang=Math.atan2(y2-y1,x2-x1), sz=5.5;
  ctx.save();
  ctx.strokeStyle=rgba(col,0.42); ctx.lineWidth=1.5; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(ax-Math.cos(ang-0.45)*sz,ay-Math.sin(ang-0.45)*sz);
  ctx.lineTo(ax,ay);
  ctx.lineTo(ax-Math.cos(ang+0.45)*sz,ay-Math.sin(ang+0.45)*sz);
  ctx.stroke(); ctx.restore();
}

// ── Draw a main node circle ───────────────────────────────────
function drawNode(id, pw, flows) {
  const n=NODES[id], abs=Math.abs(pw);
  const active=abs>0.05||id==='home';
  const col=n.color;
  const rgb={r:parseInt(col.slice(1,3),16),g:parseInt(col.slice(3,5),16),b:parseInt(col.slice(5,7),16)};

  // Outer ambient glow
  const g1=ctx.createRadialGradient(n.x,n.y,n.r*0.4,n.x,n.y,n.r*2.5);
  g1.addColorStop(0,`rgba(${rgb.r},${rgb.g},${rgb.b},${active?0.16:0.03})`);
  g1.addColorStop(1,`rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
  ctx.beginPath();ctx.arc(n.x,n.y,n.r*2.5,0,Math.PI*2);ctx.fillStyle=g1;ctx.fill();

  // Body fill
  ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
  ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.09)`;ctx.fill();

  // Ring
  ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
  ctx.strokeStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${active?0.65:0.12})`;
  ctx.lineWidth=active?2.5:1.5; ctx.stroke();

  // Pulse ring
  if(active){
    const p=0.4+0.6*Math.abs(Math.sin(S.tick/42+n.x*0.01));
    ctx.beginPath();ctx.arc(n.x,n.y,n.r+5+p*5,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${0.07+p*0.09})`;ctx.lineWidth=1.5;ctx.stroke();
  }

  // Icon
  const iconCol=active?col:rgba(col,0.28);
  if(id==='ev'){
    drawTruckIcon(n.x,n.y,n.r*0.80,iconCol,active);
  } else {
    drawNodeIcon(id,n.x,n.y,n.r*0.38,iconCol);
  }

  // kW label
  const dispKW=id==='home'?flows.load:abs;
  ctx.fillStyle=active?'#fff':'rgba(255,255,255,0.25)';
  ctx.font=`700 ${dispKW>=10?13:15}px Inter,sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText(dispKW.toFixed(1)+' kW', n.x, n.y+n.r+22);

  // Label
  ctx.fillStyle=rgba(col,active?0.78:0.28); ctx.font='600 11px Inter,sans-serif';
  ctx.fillText(n.label.toUpperCase(), n.x, n.y+n.r+36);

  // Sub status
  ctx.fillStyle=rgba(col,0.38); ctx.font='400 9.5px Inter,sans-serif';
  ctx.fillText(nodeSub(id,pw,flows), n.x, n.y+n.r+49);
}

function nodeSub(id,pw,flows){
  if(id==='solar') return flows.sol>0.05?'Producing':'Offline';
  if(id==='home')  return flows.load>0.05?'Consuming':'Idle';
  if(id==='grid')  return pw>0.05?'Importing':pw<-0.05?'Exporting':'Idle';
  if(id==='ev')    return pw<-0.05?'Charging':pw>0.05?'Discharging':'Idle';
  return '';
}

// ── Standard icon drawing ─────────────────────────────────────
function drawNodeIcon(id,x,y,r,col){
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=2; ctx.lineCap='round';
  switch(id){
    case 'solar':
      ctx.beginPath();ctx.arc(x,y,r*0.42,0,Math.PI*2);ctx.fill();
      for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(x+Math.cos(a)*r*0.55,y+Math.sin(a)*r*0.55);ctx.lineTo(x+Math.cos(a)*r*0.92,y+Math.sin(a)*r*0.92);ctx.stroke();}
      break;
    case 'grid':
      ctx.lineWidth=1.8;
      ctx.beginPath();ctx.moveTo(x,y-r*0.9);ctx.lineTo(x,y+r*0.9);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x-r*0.62,y-r*0.05);ctx.lineTo(x+r*0.62,y-r*0.05);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x-r*0.62,y-r*0.05);ctx.lineTo(x,y+r*0.9);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+r*0.62,y-r*0.05);ctx.lineTo(x,y+r*0.9);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x-r*0.4,y+r*0.35);ctx.lineTo(x+r*0.4,y+r*0.35);ctx.stroke();
      break;
    case 'home':{
      const hw=r*0.78,hh=r*0.60,roof=r*0.30;
      ctx.beginPath();ctx.moveTo(x,y-hh-roof);ctx.lineTo(x-hw,y-hh+roof*0.3);ctx.lineTo(x-hw,y+hh*0.5);ctx.lineTo(x+hw,y+hh*0.5);ctx.lineTo(x+hw,y-hh+roof*0.3);ctx.closePath();
      ctx.globalAlpha=0.80;ctx.fill();ctx.globalAlpha=1;
      ctx.fillStyle='rgba(9,12,16,0.65)';ctx.fillRect(x-r*0.18,y+hh*0.5-r*0.42,r*0.36,r*0.42);
      break;}
  }
  ctx.restore();
}

// ── Truck icon (GMC Sierra EV side profile) ───────────────────
function drawTruckIcon(cx, cy, size, col, active) {
  ctx.save();
  const s = size * 0.85;
  // Offset so truck is visually centered in node
  const ox = cx - s * 0.88, oy = cy - s * 0.30;

  ctx.strokeStyle = col;
  ctx.fillStyle   = rgba(col, 0.18);
  ctx.lineWidth   = active ? 1.8 : 1.3;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  // ── Truck body silhouette ──
  // Bed (rear left)
  ctx.beginPath();
  ctx.moveTo(ox,            oy + s*0.55);  // bottom-left
  ctx.lineTo(ox,            oy + s*0.05);  // bed wall top
  ctx.lineTo(ox + s*0.52,   oy + s*0.05);  // bed top-right
  ctx.lineTo(ox + s*0.52,   oy + s*0.55);  // bottom connector
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Cab (front right)
  ctx.beginPath();
  ctx.moveTo(ox + s*0.52,   oy + s*0.55);  // cab bottom-left
  ctx.lineTo(ox + s*0.52,   oy - s*0.08);  // cab rear-bottom
  ctx.lineTo(ox + s*0.62,   oy - s*0.30);  // cab rear-top
  ctx.lineTo(ox + s*0.90,   oy - s*0.38);  // roof back
  ctx.lineTo(ox + s*1.20,   oy - s*0.36);  // roof front
  ctx.lineTo(ox + s*1.40,   oy - s*0.18);  // windshield top
  ctx.lineTo(ox + s*1.52,   oy + s*0.02);  // hood
  ctx.lineTo(ox + s*1.60,   oy + s*0.20);  // front upper
  ctx.lineTo(ox + s*1.60,   oy + s*0.55);  // front lower
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // ── Window ──
  ctx.fillStyle = rgba(col, 0.22);
  ctx.strokeStyle = rgba(col, 0.45);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(ox + s*0.54,  oy + s*0.00);
  ctx.lineTo(ox + s*0.64,  oy - s*0.24);
  ctx.lineTo(ox + s*0.88,  oy - s*0.32);
  ctx.lineTo(ox + s*1.18,  oy - s*0.30);
  ctx.lineTo(ox + s*1.34,  oy - s*0.14);
  ctx.lineTo(ox + s*1.34,  oy + s*0.00);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // ── Wheels ──
  ctx.lineWidth = active ? 1.8 : 1.3;
  ctx.strokeStyle = col;
  ctx.fillStyle   = rgba(col, 0.08);
  [ox + s*0.28, ox + s*1.28].forEach(wx => {
    const wy = oy + s*0.68;
    ctx.beginPath();ctx.arc(wx,wy,s*0.22,0,Math.PI*2);ctx.fill();ctx.stroke();
    // Rim
    ctx.fillStyle=rgba(col,0.30);
    ctx.beginPath();ctx.arc(wx,wy,s*0.10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=rgba(col,0.08);
  });

  // ── Headlight ──
  ctx.fillStyle=rgba('#fffbe6',active?0.55:0.18);
  ctx.beginPath();ctx.ellipse(ox+s*1.595,oy+s*0.18,s*0.04,s*0.09,0,0,Math.PI*2);ctx.fill();

  // ── Tail light ──
  ctx.fillStyle=rgba('#ff4444',active?0.45:0.14);
  ctx.beginPath();ctx.ellipse(ox+s*0.018,oy+s*0.25,s*0.03,s*0.08,0,0,Math.PI*2);ctx.fill();

  // ── EV badge ──
  if(active){
    ctx.fillStyle=rgba(col,0.65);
    ctx.font=`700 ${Math.round(s*0.18)}px Inter,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('EV', ox+s*0.90, oy+s*0.32);
  }

  ctx.restore();
}

// ── Draw a load node ──────────────────────────────────────────
function drawLoadNode(id, flows) {
  const n = LOAD_NODES[id];
  const on = S.loads[id];
  const col = on ? n.color : '#2a3040';
  const glow = on ? 0.60 : 0.10;

  // Faint wire from home to load
  const home = NODES.home;
  // Control point arcs upward/downward from home
  const cpx = (home.x + n.x) / 2;
  const cpy = n.y;
  ctx.save();
  ctx.strokeStyle = on ? rgba(n.color, 0.18) : 'rgba(255,255,255,0.04)';
  ctx.lineWidth   = on ? 1.8 : 1.2;
  ctx.setLineDash(on ? [] : [4,5]);
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(home.x, home.y);
  ctx.quadraticCurveTo(cpx, cpy, n.x, n.y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Arrow (only when on)
  if(on){
    const tm=0.62;
    const pm=bez(tm,home.x,home.y,cpx,cpy,n.x,n.y);
    const pm2=bez(tm+0.06,home.x,home.y,cpx,cpy,n.x,n.y);
    const ang=Math.atan2(pm2.y-pm.y,pm2.x-pm.x),sz=5;
    ctx.save();ctx.strokeStyle=rgba(n.color,0.40);ctx.lineWidth=1.4;ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(pm2.x-Math.cos(ang-0.45)*sz,pm2.y-Math.sin(ang-0.45)*sz);
    ctx.lineTo(pm2.x,pm2.y);
    ctx.lineTo(pm2.x-Math.cos(ang+0.45)*sz,pm2.y-Math.sin(ang+0.45)*sz);
    ctx.stroke();ctx.restore();
  }

  // Particles on active load branch
  if(on){
    drawParticles(id, home.x,home.y,cpx,cpy,n.x,n.y, n.color);
  }

  // Glow
  if(on){
    const ag=ctx.createRadialGradient(n.x,n.y,n.r*0.3,n.x,n.y,n.r*2.2);
    ag.addColorStop(0,rgba(n.color,0.14));ag.addColorStop(1,rgba(n.color,0));
    ctx.beginPath();ctx.arc(n.x,n.y,n.r*2.2,0,Math.PI*2);ctx.fillStyle=ag;ctx.fill();
  }

  // Node body
  ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
  ctx.fillStyle=on?rgba(n.color,0.10):'rgba(255,255,255,0.03)';ctx.fill();
  ctx.strokeStyle=rgba(on?n.color:'#2a3040',glow);
  ctx.lineWidth=on?2:1.2;ctx.stroke();

  // Pulse
  if(on){
    const p=0.4+0.6*Math.abs(Math.sin(S.tick/44+n.x*0.012));
    ctx.beginPath();ctx.arc(n.x,n.y,n.r+4+p*4,0,Math.PI*2);
    ctx.strokeStyle=rgba(n.color,0.06+p*0.07);ctx.lineWidth=1.2;ctx.stroke();
  }

  // Emoji icon
  ctx.font=`${on?20:16}px sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.globalAlpha=on?0.90:0.28;
  ctx.fillText(n.icon, n.x, n.y-3);
  ctx.globalAlpha=1;

  // kW value
  ctx.fillStyle=on?n.color:'rgba(255,255,255,0.18)';
  ctx.font=`700 10.5px Inter,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText(n.kw.toFixed(1)+' kW', n.x, n.y+n.r+16);

  // Label
  ctx.fillStyle=on?rgba(n.color,0.68):'rgba(255,255,255,0.18)';
  ctx.font='500 9.5px Inter,sans-serif';
  ctx.fillText(n.label.toUpperCase(), n.x, n.y+n.r+28);

  // Click target visual indicator (subtle underline when off)
  if(!on){
    ctx.fillStyle='rgba(255,255,255,0.10)';
    ctx.font='500 8px Inter,sans-serif';
    ctx.fillText('tap to add', n.x, n.y+n.r+40);
  }
}

// ── Junction dot ─────────────────────────
function drawJunction(flows) {
  const tot=Math.abs(flows.pSolar)+Math.abs(flows.pGrid)+Math.abs(flows.pEV);
  if(tot<0.1) return;
  const p=0.5+0.5*Math.sin(S.tick/26);
  ctx.beginPath();ctx.arc(JX,JY,5+p*2,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,255,255,${0.07+p*0.05})`;ctx.fill();
  ctx.beginPath();ctx.arc(JX,JY,2.8,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.fill();
}

// ── Main render ───────────────────────────
function frame() {
  const f = calcFlows();
  tickParts(f);

  // Background
  ctx.fillStyle='#090c10';ctx.fillRect(0,0,W,H);

  // Subtle grid dots
  ctx.fillStyle='rgba(79,195,247,0.025)';
  for(let x=0;x<W;x+=44)for(let y=0;y<H;y+=44){ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();}

  // Center glow
  const bg=ctx.createRadialGradient(JX,JY,0,JX,JY,240);
  bg.addColorStop(0,'rgba(79,195,247,0.038)');bg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // ── Spoke lines (before nodes) ──
  const pw={solar:f.pSolar,grid:f.pGrid,ev:f.pEV,home:f.pHome};
  Object.keys(NODES).forEach(id=>drawSpoke(NODES[id],pw[id],JX,JY));

  // ── Direction arrows on main spokes ──
  Object.keys(NODES).forEach(id=>{
    const p=pw[id]; if(Math.abs(p)<0.05) return;
    const n=NODES[id],toC=p>0;
    const [x1,y1,x2,y2]=toC?[n.x,n.y,JX,JY]:[JX,JY,n.x,n.y];
    drawArrow(x1,y1,x2,y2,n.color,0.55);
  });

  // ── Particles on main spokes ──
  Object.keys(NODES).forEach(id=>{
    const p=pw[id]; if(Math.abs(p)<0.05) return;
    const n=NODES[id];
    drawParticles(id, n.x,n.y,(n.x+JX)/2,(n.y+JY)/2,JX,JY, n.color);
  });

  // ── Junction ──
  drawJunction(f);

  // ── Load nodes (behind Home node layer-wise) ──
  Object.keys(LOAD_NODES).forEach(id=>drawLoadNode(id,f));

  // ── Main nodes ──
  ['solar','grid','ev','home'].forEach(id=>drawNode(id,pw[id],f));

  // ── Update header status ──
  const ml=['EV Charging','V2G \u2013 Savings Mode','V2G VPP \u2013 Net Zero','V2G VPP \u2013 Fixed Output'];
  const mc=['#4fc3f7','#f5a623','#4cd964','#c084fc'];
  const st=document.getElementById('mode-label');
  st.textContent=ml[S.mode]; st.style.color=mc[S.mode];

  S.tick++;
  requestAnimationFrame(frame);
}

// ── Hit test: is a point inside a load node? ─────────────────
function hitLoadNode(mx,my) {
  for(const id of Object.keys(LOAD_NODES)){
    const n=LOAD_NODES[id];
    // Bigger tap target
    if(Math.hypot(mx-n.x,my-n.y)<=n.r+14) return id;
  }
  return null;
}

// ── Events ───────────────────────────────
canvas.addEventListener('click', e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  const hit=hitLoadNode(mx,my);
  if(hit){ S.loads[hit]=!S.loads[hit]; }
});

document.querySelectorAll('.mode-btn').forEach(btn=>btn.addEventListener('click',()=>{
  S.mode=+btn.dataset.mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}));

document.getElementById('solar-toggle').addEventListener('click',function(){
  S.solar=!S.solar; this.classList.toggle('on',S.solar);
});

frame();
</script>
</body>
</html>
